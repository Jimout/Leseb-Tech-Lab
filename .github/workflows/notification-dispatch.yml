# Manual-only trigger: set repo secrets APP_URL and CRON_SECRET (must match deployment CRON_SECRET).
# Test: POST {APP_URL}/api/notifications/dispatch with Authorization: Bearer {CRON_SECRET}.
# Do not add `schedule` until that returns 2xx reliably. If you need periodic queued dispatch later,
# prefer the host platform’s cron (e.g. Vercel cron) over relying on GitHub Actions alone.
# Optional later: hour-scale recovery cron on the platform only — not the primary send path.
#
# Checklist before re-enabling automation: manual POST returns 200; admin shows sane counts;
# failed rows stay retryable; no silent drops (inspect DB + lastDispatchSummary).
name: Notification Dispatch

on:
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger notification dispatch endpoint
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "Missing APP_URL secret"
            exit 1
          fi

          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "Missing CRON_SECRET secret"
            exit 1
          fi

          app_url="${{ secrets.APP_URL }}"
          app_url="${app_url%/}"
          url="$app_url/api/notifications/dispatch"

          echo "Dispatch URL: $url"

          http_code="$(curl -sS --max-time 150 -o response.txt -w "%{http_code}" -X POST "$url" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")"

          echo "HTTP status: $http_code"
          echo "Response body:"
          cat response.txt

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi
